program: system/main.py
name: centralized-nocliprul
method: grid
description: Grid search over FedCMAPSS RUL tasks, learning rates, and training epochs in centralized mode.

command:
  - ${env}
  - ${interpreter}
  - -u
  - system/main.py
  - --wandb-log
  - --algorithm
  - Centralized_RUL
  - --centralized
  - --no-clip-rul
  - --dataset
  - FedCMAPSSWindow
  - --data_root
  - dataset/FedCMAPSS/
  - --model
  - LSTM_RUL
  - ${args}

parameters:
  task:
    values: ["A"]
  local_learning_rate:
    values: [0.0001, 0.001, 0.01]
  global_rounds:
    values: [10, 30, 50, 100]
  split:
    values: [0]
  batch_size:
    values: [16, 32, 64]

