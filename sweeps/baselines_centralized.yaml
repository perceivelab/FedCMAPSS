program: system/main.py
name: baselines_centralized
method: grid
description: Grid search over FedCMAPSS RUL tasks, learning rates, and training epochs in centralized mode.

command:
  - ${env}
  - ${interpreter}
  - -u
  - system/main.py
  - --wandb-log
  - --algorithm
  - Centralized_RUL
  - --centralized
  - --dataset
  - FedCMAPSSWindow
  - --data_root
  - dataset/FedCMAPSS/
  - ${args}

parameters:
  task:
    values: ["A"]
  local_learning_rate:
    values: [0.0001, 0.001, 0.01,0.0005, 0.005, 0.05]
  global_rounds:
    values: [10, 30, 50, 100, 200]
  split:
    values: [0]
  batch_size:
    values: [16,32,64]
  no_clip_rul:
    values: [true, false]
  model:
    values: ["LSTM_v2_RUL", "MLP_LSTM_MLP_RUL", "AFT_RUL", "AttBiGRU_RUL", "RNN_RUL", "Chen_CNN_RUL","LSTM_RUL"]
